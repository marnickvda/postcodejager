name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require deploy config
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -z "$SERVER_HOST" ]; then
            echo "::error::SERVER_HOST secret not set — follow deploy/README.md (provision the server + add the GitHub secrets) first."
            exit 1
          fi

      - name: Install Ansible
        run: |
          pipx install ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          REPO: ${{ github.repository }}
        run: |
          ansible-playbook -i "$SERVER_HOST," \
            deploy/ansible/playbook.yml \
            --private-key ~/.ssh/id_deploy \
            -u root \
            -e "repo_url=https://github.com/$REPO.git" \
            -e "domain=$SERVER_HOST" \
            -e "strava_client_id=$STRAVA_CLIENT_ID" \
            -e "strava_client_secret=$STRAVA_CLIENT_SECRET"
