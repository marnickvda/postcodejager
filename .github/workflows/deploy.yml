name: Deploy

on:
  push:
    tags:
      - "v*" # deploy on a version tag, e.g. v1.0.0
  workflow_dispatch: # or trigger manually from the Actions tab

# Never run two deploys at once.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Require deploy config
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          if [ -z "$SERVER_IP" ] || [ -z "$SERVER_HOST" ]; then
            echo "::error::Set the SERVER_IP and SERVER_HOST secrets first (see deploy/README.md)."
            exit 1
          fi

      - name: Install Ansible
        run: |
          pipx install ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        # SSH to the server by IP (no DNS dependency); the domain is only used
        # for Caddy's HTTPS site + the Strava redirect URI.
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          BASEMAP_PLANET_URL: ${{ secrets.BASEMAP_PLANET_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          ansible-playbook -i "$SERVER_IP," \
            deploy/ansible/playbook.yml \
            --private-key ~/.ssh/id_deploy \
            -u root \
            -e "repo_url=https://github.com/$REPO.git" \
            -e "branch=$REF" \
            -e "domain=$SERVER_HOST" \
            -e "strava_client_id=$STRAVA_CLIENT_ID" \
            -e "strava_client_secret=$STRAVA_CLIENT_SECRET" \
            -e "basemap_planet_url=$BASEMAP_PLANET_URL"
